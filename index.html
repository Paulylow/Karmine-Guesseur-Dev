<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>KarmineGuesser - MODE DEV</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="panorama"></div>
    <div id="animated-bg"></div>

    <!-- ================= ÉCRAN DE CONNEXION ================= -->
    <div id="login-screen" class="screen">
        <div class="lobby-container login-box">
            <img src="logo.png" alt="Logo" class="lobby-logo">
            <h1 class="lobby-title">MODE DÉVELOPPEUR</h1>
            <div class="input-group">
                <label for="rp-name">Nom RP (RôlePlay)</label>
                <input type="text" id="rp-name" placeholder="Ex: Développeur" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="mc-pseudo">Pseudo Minecraft</label>
                <input type="text" id="mc-pseudo" placeholder="Ex: Admin" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="room-code">Code de la partie</label>
                <input type="text" id="room-code" placeholder="Ex: TEST" autocomplete="off" style="text-transform: uppercase;">
            </div>
            <button id="join-lobby-btn" class="guess-btn">Rejoindre le Lobby</button>
        </div>
    </div>

    <!-- ================= ÉCRAN LOBBY ================= -->
    <div id="lobby-screen" class="screen hidden-screen">
        <div class="lobby-container">
            <h1 class="lobby-title">SALLE DE TEST (<span id="display-room-code" style="color:var(--cyan);">...</span>)</h1>
            <div class="players-list" id="lobby-players">
                <p style="color: #888;">Chargement des joueurs...</p>
            </div>
            <div id="host-settings" class="host-settings hidden-screen">
                <h3 class="settings-title">⚙️ Paramètres des Maps</h3>
                <div class="settings-grid">
                    <div class="setting-item" style="flex: unset; width: 100%;">
                        <label>Sélection</label>
                        <select id="setting-rounds" class="kg-select">
                            <option value="33" selected>Nouvelles Maps 14, 16, et 20 à 50 (33 Lieux)</option>
                        </select>
                    </div>
                </div>
                <button id="start-game-btn" class="guess-btn">Lancer la calibration</button>
            </div>
            <p id="waiting-host-msg" class="lobby-info hidden-screen">En attente du lancement par l'hôte...</p>
            <button id="disconnect-btn" class="disconnect-btn">Quitter la salle</button>
        </div>
    </div>

    <!-- ================= INTERFACE DU JEU ================= -->
    <div id="game-ui" class="screen hidden-screen">
        <header class="game-header">
            <div class="logo"><img src="logo.png" alt="Karmine Guesser Logo"></div>
            <div class="game-stats">
                <div class="stat-box">
                    <span class="stat-label">Temps</span>
                    <span class="stat-value" id="timer-display" style="font-size: 32px; line-height: 24px;">∞</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Lieu</span>
                    <span class="stat-value"><span id="round-display">1</span>/<span id="total-round-display">33</span></span>
                </div>
            </div>
        </header>

        <div id="live-leaderboard" class="live-leaderboard">
            <div class="leaderboard-title">CLASSEMENT DEV</div>
            <div id="leaderboard-content"></div>
        </div>

        <button id="host-end-round-btn" class="guess-btn hidden-screen" style="position: absolute; bottom: 30px; left: 30px; width: auto; padding: 15px 30px; z-index: 100; pointer-events: auto; background: #ff4757; color: white;">🛑 FORCER LA FIN DU ROUND</button>

        <div id="map-wrapper">
            <div class="map-hover-area" id="map-container">
                <div id="map"></div>
                <button id="guess-btn" class="guess-btn" disabled>Placer le point</button>
            </div>
        </div>

        <div id="round-announcer" class="overlay hidden">
            <h1 class="round-title" id="round-title-text" style="text-align: center; font-size: 80px;">ROUND 1<br><span style="font-size: 40px; color: white;" id="round-subtitle">Lieu X</span></h1>
        </div>

        <div id="result-overlay" class="overlay hidden"></div>

        <div id="result-modal" class="result-modal hidden">
            <h2 class="art-title">Résultat</h2>
            <p class="distance-text">Distance : <span id="distanceDisplay" class="cyan-text">0</span></p>
            <p class="score-num">+<span id="scoreDisplay">0</span> pts</p>
            <p class="waiting-text" id="waiting-msg">En attente des autres joueurs...</p>
            <button id="host-next-round-btn" class="guess-btn hidden-screen" style="margin-top: 20px;">▶️ ROUND SUIVANT</button>
        </div>
    </div>

    <!-- ================= ÉCRAN PODIUM FINAL ================= -->
    <div id="podium-screen" class="screen hidden-screen">
        <div class="podium-container">
            <img src="logo.png" alt="Logo" class="lobby-logo" style="margin-bottom: 20px;">
            <h1 class="lobby-title" style="color: var(--cyan);">TOUTES LES MAPS SONT FAITES !</h1>
            <div class="podium" id="podium-content"></div>
            <button id="return-lobby-btn" class="guess-btn" style="max-width: 300px; margin-top: 40px;">Retour au Menu</button>
        </div>
    </div>

    <!-- LE CERVEAU SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
